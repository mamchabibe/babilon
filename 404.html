<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Hidden</title>
  <meta name="description" content="A hidden page withheld from the visible paths of the site." />
  <script>
    (function () {
      var baseHref;
      if (location.protocol === "file:") {
        baseHref = new URL("./", location.href).href;
      } else {
        var marker = "/babilon/";
        var index = location.pathname.indexOf(marker);
        baseHref = index >= 0 ? location.origin + marker : location.origin + "/";
      }
      document.write('<base href="' + baseHref + '">');
    })();
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hidden-shell {
      width: min(100%, 900px);
    }

    .hidden-copy {
      white-space: pre-line;
      line-height: 1.9;
      font-size: 1.02rem;
      color: var(--sand);
    }
  </style>
</head>
<body>
  <!-- hidden-state-route -->
  <main class="hidden-shell">
    <article class="section-card hidden-copy">
I stood above the city and called it mine.
I praised the work of my hands and the might of my glory.
Before the boast had finished breathing, Heaven answered me.
I was driven lower than beasts though I had stood higher than kings.

Name the king.
Or bring me the verse of his arrogance.
    </article>
  </main>
</body>
</html>
